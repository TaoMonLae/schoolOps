<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SchoolOps</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>" />

  <!-- Education-focused type system -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet" />

  <!-- React + ReactDOM CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel for JSX in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ═══════════════════════════════════════════════
       SCHOOLOPS — Education Design System v3
       Palette: Academy Navy · Crest Blue · House Gold
    ════════════════════════════════════════════════ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ── Brand — Indigo (primary actions, focus, active nav) */
      --brand:        #2457d6;
      --brand-dark:   #193ea7;
      --brand-light:  #eef4ff;
      --brand-mid:    #4b7cff;
      --brand-soft:   #dbe8ff;
      --accent:       #d4a72c;
      --accent-light: #fff7db;

      /* ── Semantic — Emerald (success / paid / present) */
      --green:        #059669;
      --green-dark:   #047857;
      --green-light:  #ecfdf5;

      /* ── Semantic — Rose (danger / overdue) */
      --red:          #e11d48;
      --red-light:    #fff1f2;

      /* ── Semantic — Amber (warning / attention) */
      --amber:        #d97706;
      --amber-light:  #fffbeb;

      /* ── Semantic — Sky (info / notifications) */
      --blue:         #0284c7;
      --blue-light:   #e0f2fe;

      /* ── Neutrals — Slate scale */
      --dark:         #0e1b34;
      --mid:          #51627e;
      --muted:        #8191ab;
      --border:       #dbe5f2;
      --border-focus: #8bb0ff;
      --bg:           #f3f7fc;
      --card:         #ffffff;

      /* ── Sidebar */
      --sidebar-bg:   #0b1630;
      --sidebar-w:    242px;

      /* ── Layout */
      --header-h:     62px;
      --radius-sm:    6px;
      --radius-md:    10px;
      --radius-lg:    14px;
      --radius-xl:    18px;

      /* ── Elevation */
      --shadow-xs:    0 1px 2px rgba(12,24,49,.05);
      --shadow-sm:    0 8px 24px rgba(17,35,74,.06), 0 2px 6px rgba(17,35,74,.04);
      --shadow-md:    0 16px 36px rgba(17,35,74,.09), 0 6px 12px rgba(17,35,74,.05);
      --shadow-lg:    0 24px 56px rgba(17,35,74,.13), 0 10px 18px rgba(17,35,74,.06);
      --shadow-xl:    0 36px 80px rgba(11,22,48,.18), 0 14px 28px rgba(11,22,48,.08);
    }

    :root[data-theme="night_study"] {
      --brand:        #7fa8ff;
      --brand-dark:   #5f84d9;
      --brand-light:  #17213a;
      --brand-mid:    #9ec0ff;
      --brand-soft:   #243150;
      --accent:       #e4b85f;
      --accent-light: #3b2d12;

      --green:        #67c69a;
      --green-dark:   #3ea576;
      --green-light:  #11261e;

      --red:          #ff8796;
      --red-light:    #32151b;

      --amber:        #e2b15b;
      --amber-light:  #35260f;

      --blue:         #87b8ff;
      --blue-light:   #14253f;

      --dark:         #edf3ff;
      --mid:          #b3c1da;
      --muted:        #8696b4;
      --border:       #24314f;
      --border-focus: #7fa8ff;
      --bg:           #0c1220;
      --card:         #121a2c;

      --sidebar-bg:   #09101d;

      --shadow-xs:    0 1px 2px rgba(0,0,0,.32);
      --shadow-sm:    0 8px 24px rgba(0,0,0,.3), 0 2px 6px rgba(0,0,0,.2);
      --shadow-md:    0 16px 36px rgba(0,0,0,.34), 0 6px 12px rgba(0,0,0,.24);
      --shadow-lg:    0 24px 56px rgba(0,0,0,.38), 0 10px 18px rgba(0,0,0,.28);
      --shadow-xl:    0 36px 80px rgba(0,0,0,.44), 0 14px 28px rgba(0,0,0,.32);
    }

    html, body, #root { height: 100%; }

    body {
      font-family: 'Manrope', 'Segoe UI', system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(36,87,214,.08), transparent 22%),
        radial-gradient(circle at 85% 12%, rgba(212,167,44,.11), transparent 16%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 24%, #eef4fb 100%);
      color: var(--dark);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    :root[data-theme="night_study"] body {
      background:
        radial-gradient(circle at top left, rgba(127,168,255,.12), transparent 22%),
        radial-gradient(circle at 85% 12%, rgba(228,184,95,.08), transparent 18%),
        linear-gradient(180deg, #10182b 0%, var(--bg) 24%, #0a101d 100%);
    }

    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }

    input, select, textarea {
      font-family: inherit;
      font-size: 13.5px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 11px;
      outline: none;
      width: 100%;
      background: white;
      color: var(--dark);
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }

    label {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--mid);
      display: block;
      margin-bottom: 5px;
      letter-spacing: .01em;
    }

    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 11px 15px; text-align: left; border-bottom: 1px solid var(--border); }
    th {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      background: #f8fafc;
      border-bottom: 1.5px solid var(--border);
    }
    tr:hover td { background: var(--brand-light); }
    tbody tr:last-child td { border-bottom: none; }

    /* ══ LAYOUT ══════════════════════════════════════ */
    .layout { display: flex; height: 100%; }
    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.5);
      backdrop-filter: blur(2px);
      z-index: 90;
      display: none;
    }

    /* ── Sidebar ───────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      background-image:
        radial-gradient(circle at top right, rgba(75,124,255,.18), transparent 28%),
        linear-gradient(180deg, #132246 0%, #0b1630 60%);
      color: white;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
      overflow-x: hidden;
      transition: transform .24s cubic-bezier(.4,0,.2,1), box-shadow .24s ease;
      z-index: 100;
      border-right: 1px solid rgba(255,255,255,.04);
    }

    :root[data-theme="night_study"] .sidebar {
      background-image:
        radial-gradient(circle at top right, rgba(127,168,255,.12), transparent 28%),
        linear-gradient(180deg, #101a32 0%, #09101d 60%);
    }

    .sidebar-brand {
      padding: 22px 18px 18px;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .sidebar-brand-panel {
      padding: 14px;
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(255,255,255,.1), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }
    .sidebar-brand h1 {
      font-size: 16px;
      font-weight: 700;
      color: white;
      letter-spacing: -.01em;
    }
    .sidebar-brand small { font-size: 11px; color: rgba(255,255,255,.42); }
    .sidebar-brand-copy {
      margin-top: 12px;
      font-size: 11.5px;
      line-height: 1.6;
      color: rgba(255,255,255,.58);
    }
    .sidebar-brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(212,167,44,.16);
      border: 1px solid rgba(212,167,44,.24);
      color: #ffe49c;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .02em;
    }

    .brand-logo { display: block; object-fit: contain; background: white; }
    .brand-logo-sidebar {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      margin-bottom: 11px;
      padding: 6px;
      box-shadow: 0 4px 14px rgba(0,0,0,.3);
    }

    .sidebar-nav { flex: 1; padding: 10px 0 6px; }

    .nav-section {
      padding: 14px 18px 5px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,.28);
    }
    .nav-section:first-child { padding-top: 8px; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px 9px 18px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,.62);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .14s, color .14s, border-color .14s;
      width: 100%;
      text-align: left;
      background: transparent;
      border-top: none;
      border-right: none;
      border-bottom: none;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin: 1px 0;
    }
    .nav-item:hover {
      background: rgba(255,255,255,.07);
      color: rgba(255,255,255,.92);
    }
    .nav-item.active {
      background: linear-gradient(90deg, rgba(75,124,255,.22), rgba(75,124,255,.08));
      color: #bdd4ff;
      border-left-color: var(--brand-mid);
      font-weight: 600;
    }
    .nav-item .icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }

    .sidebar-footer {
      padding: 14px 16px 18px;
      border-top: 1px solid rgba(255,255,255,.07);
    }
    .sidebar-footer small { color: rgba(255,255,255,.35); font-size: 11px; }
    .sidebar-footer .logout-btn {
      margin-top: 9px;
      width: 100%;
      padding: 8px 12px;
      background: rgba(255,255,255,.07);
      color: rgba(255,255,255,.65);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      transition: background .15s, color .15s;
    }
    .sidebar-footer .logout-btn:hover {
      background: rgba(225,29,72,.35);
      color: #fca5a5;
      border-color: rgba(225,29,72,.3);
    }

    /* ── Main shell ────────────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    .topbar {
      min-height: var(--header-h);
      background: rgba(255,255,255,.8);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(219,229,242,.9);
      box-shadow: var(--shadow-xs);
      display: flex;
      align-items: center;
      padding: 12px 26px;
      gap: 12px;
      flex-shrink: 0;
      flex-wrap: wrap;
      overflow: visible;
      position: relative;
      z-index: 120;
    }
    .topbar h2 { font-size: 17px; font-weight: 700; flex: 1; letter-spacing: -.01em; }
    .topbar-leading {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1 1 360px;
    }
    .topbar-trailing {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      flex-wrap: wrap;
      justify-content: flex-end;
      position: relative;
      overflow: visible;
    }
    .menu-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      background: white;
      font-size: 18px;
      transition: background .14s;
    }
    .menu-toggle:hover { background: var(--bg); }

    .page-heading { min-width: 0; }
    .page-heading h2 { margin-bottom: 1px; }
    .page-kicker {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--brand-light);
      color: var(--brand-dark);
      font-size: 10.5px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .page-heading h2 {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 26px;
      line-height: 1.05;
      letter-spacing: -.03em;
    }
    .page-subtitle { font-size: 12.5px; color: var(--mid); max-width: 760px; }
    .topbar-date { font-size: 12px; color: var(--muted); white-space: nowrap; font-weight: 500; }
    .topbar-page-select { max-width: 220px; }
    .topbar-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .context-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 999px;
      padding: 7px 11px;
      background: white;
      border: 1px solid var(--border);
      color: var(--mid);
      font-size: 11.5px;
      font-weight: 700;
      box-shadow: var(--shadow-xs);
    }
    .context-chip strong {
      color: var(--dark);
      font-weight: 800;
    }
    .context-chip.role {
      background: linear-gradient(180deg, var(--brand-light), #ffffff);
      border-color: #bfd3ff;
      color: var(--brand-dark);
    }

    /* ── Notifications ─────────────────────────────── */
    .notification-wrap { position: relative; overflow: visible; z-index: 130; }
    .notification-bell {
      position: relative;
      border: 1.5px solid var(--border);
      background: white;
      border-radius: var(--radius-md);
      padding: 7px 11px;
      font-size: 17px;
      line-height: 1;
      transition: border-color .14s, box-shadow .14s;
    }
    .notification-bell:hover {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    .notification-pill {
      position: absolute;
      top: -6px;
      right: -6px;
      background: var(--red);
      color: white;
      border-radius: 999px;
      min-width: 19px;
      height: 19px;
      font-size: 10px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      border: 2px solid white;
    }
    .notification-panel {
      position: absolute;
      right: 0;
      top: 46px;
      width: min(540px, 92vw);
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xl);
      padding: 14px;
      z-index: 2000;
    }
    .notification-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .notification-list { max-height: 420px; overflow-y: auto; display: grid; gap: 8px; }
    .notification-item {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 11px 13px;
      transition: border-color .14s;
    }
    .notification-item:hover { border-color: var(--brand-mid); }
    .notification-item.unread {
      border-left: 4px solid var(--blue);
      background: #f0f9ff;
    }
    .notification-item.read { opacity: .88; }

    /* ── Page content ──────────────────────────────── */
    .page-content {
      flex: 1;
      overflow-y: auto;
      padding: 26px;
      min-width: 0;
      position: relative;
    }
    .page-content::before {
      content: '';
      position: fixed;
      inset: auto 4% 10% auto;
      width: 340px;
      height: 340px;
      background: radial-gradient(circle, rgba(75,124,255,.08) 0%, transparent 68%);
      pointer-events: none;
      filter: blur(10px);
    }
    .page-content > * { min-width: 0; }

    /* ══ CARDS ══════════════════════════════════════ */
    .card {
      background: rgba(255,255,255,.94);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 22px;
      min-width: 0;
    }
    .card-title {
      font-size: 14.5px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--dark);
      letter-spacing: -.01em;
    }

    .card-kicker {
      font-size: 10.5px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--brand);
      margin-bottom: 8px;
    }

    /* Hero card — education banner */
    .hero-card {
      padding: 26px 28px;
      border-radius: var(--radius-xl);
      border: 1px solid rgba(36,87,214,.12);
      background:
        radial-gradient(circle at top right, rgba(212,167,44,.18), transparent 20%),
        linear-gradient(135deg, #ffffff 0%, #f4f8ff 52%, #edf4ff 100%);
      box-shadow: 0 18px 44px rgba(36,87,214,.08);
      margin-bottom: 20px;
      min-width: 0;
      position: relative;
      overflow: hidden;
    }

    :root[data-theme="night_study"] .hero-card {
      border-color: rgba(127,168,255,.16);
      background:
        radial-gradient(circle at top right, rgba(228,184,95,.14), transparent 20%),
        linear-gradient(135deg, #141d32 0%, #121b2d 52%, #0e1628 100%);
      box-shadow: 0 18px 44px rgba(0,0,0,.24);
    }
    .hero-card::before {
      content: '';
      position: absolute;
      top: -34px;
      right: -26px;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(36,87,214,.09) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .hero-eyebrow {
      font-size: 11px;
      font-weight: 700;
      color: var(--brand);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 7px;
    }
    .hero-title {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 31px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -.02em;
      color: var(--dark);
    }
    .hero-copy { color: var(--mid); max-width: 780px; font-size: 14px; }
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    .hero-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .hero-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(36,87,214,.12);
      color: var(--mid);
      font-size: 12px;
      font-weight: 700;
    }
    .hero-pill strong {
      color: var(--dark);
      font-weight: 800;
    }

    /* Quick cards */
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .quick-card {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
      box-shadow: var(--shadow-xs);
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-align: left;
      min-height: 122px;
      transition: border-color .18s, box-shadow .18s, transform .18s;
    }
    .quick-card:hover {
      border-color: rgba(37,99,235,.3);
      box-shadow: 0 8px 24px rgba(37,99,235,.1);
      transform: translateY(-2px);
    }
    .quick-card-title { font-size: 13.5px; font-weight: 700; letter-spacing: -.01em; }
    .quick-card-copy { font-size: 12.5px; color: var(--mid); }
    .quick-card-meta { font-size: 11px; color: var(--muted); margin-top: auto; font-weight: 500; }

    /* Summary strip */
    .summary-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 13px;
      margin-bottom: 20px;
    }
    .summary-tile {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(248,251,255,.96));
      box-shadow: var(--shadow-xs);
      padding: 16px 18px;
    }
    .summary-tile-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--muted);
      font-weight: 700;
    }
    .summary-tile-value { font-size: 22px; font-weight: 800; margin-top: 5px; letter-spacing: -.02em; }
    .summary-tile-copy { font-size: 12px; color: var(--mid); margin-top: 3px; }

    .section-stack { display: grid; gap: 16px; }

    .table-card { padding: 0; overflow: hidden; min-width: 0; box-shadow: var(--shadow-sm); }
    .table-card .card-head {
      padding: 16px 20px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .table-card .card-head .card-title { margin-bottom: 0; }

    /* Info banners */
    .info-banner {
      display: flex;
      align-items: flex-start;
      gap: 13px;
      border-radius: var(--radius-md);
      padding: 14px 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(2,132,199,.2);
      background: #f0f9ff;
    }
    .info-banner.success {
      background: #f0fdf4;
      border-color: rgba(5,150,105,.2);
    }
    .info-banner .icon { font-size: 20px; line-height: 1; flex-shrink: 0; }

    .insight-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    .insight-card {
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(247,250,255,.96));
      box-shadow: var(--shadow-sm);
      padding: 18px;
      min-width: 0;
    }
    .insight-card h3 {
      font-size: 15px;
      margin-bottom: 6px;
      letter-spacing: -.02em;
    }
    .insight-card p {
      font-size: 12.5px;
      color: var(--mid);
      margin-bottom: 12px;
    }
    .insight-stat {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.03em;
      color: var(--dark);
      margin-bottom: 6px;
    }
    .mini-list {
      display: grid;
      gap: 9px;
    }
    .mini-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      padding-bottom: 9px;
      border-bottom: 1px dashed var(--border);
      font-size: 12.5px;
    }
    .mini-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .mini-row strong {
      color: var(--dark);
    }

    .content-grid-2 {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(300px, 1fr);
      gap: 18px;
      align-items: start;
    }
    .sticky-card { position: sticky; top: 16px; }

    .check-list { display: grid; gap: 10px; }
    .check-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }
    .check-item:last-child { border-bottom: none; padding-bottom: 0; }
    .muted { color: var(--muted); }

    /* ══ STAT CARDS ══════════════════════════════════ */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 18px 20px;
      border-top: 3px solid var(--border);
      transition: box-shadow .18s, transform .18s;
    }
    .stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }

    /* Colored top accent per stat type */
    .stat-card:has(.stat-green)  { border-top-color: var(--green); }
    .stat-card:has(.stat-red)    { border-top-color: var(--red); }
    .stat-card:has(.stat-amber)  { border-top-color: var(--amber); }
    .stat-card:has(.stat-blue)   { border-top-color: var(--blue); }

    .stat-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .stat-value { font-size: 26px; font-weight: 800; letter-spacing: -.03em; }
    .stat-sub   { font-size: 12px; color: var(--muted); margin-top: 3px; font-weight: 500; }
    .stat-green { color: var(--green); }
    .stat-red   { color: var(--red); }
    .stat-amber { color: var(--amber); }
    .stat-blue  { color: var(--blue); }

    /* ══ BUTTONS ══════════════════════════════════════ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 17px;
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      font-weight: 600;
      border: none;
      transition: background .15s, box-shadow .15s, transform .1s;
      letter-spacing: .005em;
    }
    .btn:active { transform: scale(.98); }

    .btn-primary {
      background: linear-gradient(180deg, var(--brand-mid), var(--brand));
      color: white;
      box-shadow: 0 8px 18px rgba(36,87,214,.23);
    }
    .btn-primary:hover {
      background: linear-gradient(180deg, var(--brand), var(--brand-dark));
      box-shadow: 0 12px 26px rgba(36,87,214,.26);
    }
    .btn-danger    { background: var(--red); color: white; }
    .btn-danger:hover  { background: #be123c; }
    .btn-secondary {
      background: white;
      color: var(--mid);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover { background: var(--bg); border-color: #cbd5e1; color: var(--dark); }
    .btn-amber     { background: var(--amber); color: white; }
    .btn-amber:hover { background: #b45309; }
    .btn-sm { padding: 5px 11px; font-size: 12px; }
    .btn-icon { padding: 7px 9px; }

    :root[data-theme="night_study"] .topbar {
      background: rgba(10, 16, 29, .88);
      border-bottom-color: rgba(36,49,79,.95);
    }
    :root[data-theme="night_study"] .card,
    :root[data-theme="night_study"] .summary-tile,
    :root[data-theme="night_study"] .quick-card,
    :root[data-theme="night_study"] .insight-card,
    :root[data-theme="night_study"] .notification-panel,
    :root[data-theme="night_study"] .notification-item,
    :root[data-theme="night_study"] .modal,
    :root[data-theme="night_study"] .context-chip {
      background: rgba(18,26,44,.96);
      border-color: rgba(36,49,79,.95);
      color: var(--dark);
    }
    :root[data-theme="night_study"] .table-card .card-head,
    :root[data-theme="night_study"] .notification-panel-header {
      border-bottom-color: rgba(36,49,79,.95);
    }
    :root[data-theme="night_study"] input,
    :root[data-theme="night_study"] select,
    :root[data-theme="night_study"] textarea,
    :root[data-theme="night_study"] .menu-toggle,
    :root[data-theme="night_study"] .notification-bell,
    :root[data-theme="night_study"] .topbar-page-select {
      background: #11192b;
      color: var(--dark);
      border-color: rgba(36,49,79,.95);
    }
    :root[data-theme="night_study"] th {
      background: #0f1627;
    }
    :root[data-theme="night_study"] tr:hover td {
      background: rgba(127,168,255,.08);
    }
    :root[data-theme="night_study"] .btn-secondary {
      background: #11192b;
      color: var(--dark);
      border-color: rgba(36,49,79,.95);
    }
    :root[data-theme="night_study"] .btn-secondary:hover {
      background: #152039;
      color: #ffffff;
    }
    :root[data-theme="night_study"] .badge-gray   { background: #202a41; color: #c2cee4; }
    :root[data-theme="night_study"] .badge-blue   { background: #162743; color: #9fc4ff; }
    :root[data-theme="night_study"] .badge-green  { background: #153024; color: #8ee0b5; }
    :root[data-theme="night_study"] .badge-amber  { background: #372a14; color: #f0c980; }
    :root[data-theme="night_study"] .badge-red    { background: #381721; color: #ff9dab; }
    :root[data-theme="night_study"] .login-logo h1,
    :root[data-theme="night_study"] .login-logo small,
    :root[data-theme="night_study"] .login-error,
    :root[data-theme="night_study"] .page-kicker {
      color: inherit;
    }
    :root[data-theme="night_study"] .login-error {
      background: #32151b;
      border-color: #5c2230;
      color: #ffb2bd;
    }

    /* ══ BADGES ══════════════════════════════════════ */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .02em;
    }
    .badge-green  { background: #dcfce7; color: #15803d; }
    .badge-red    { background: #ffe4e6; color: #be123c; }
    .badge-amber  { background: #fef3c7; color: #b45309; }
    .badge-blue   { background: #e0f2fe; color: #0369a1; }
    .badge-gray   { background: #f1f5f9; color: #64748b; }

    /* ══ FORMS ═══════════════════════════════════════ */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid .span2 { grid-column: 1 / -1; }
    .form-group { display: flex; flex-direction: column; }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; }

    /* ── Filters bar ───────────────────────────────── */
    .filters {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      min-width: 0;
    }
    .filters-main { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .filters-actions { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .filters select, .filters input { width: auto; min-width: 120px; }

    .card table,
    .table-card table { min-width: 680px; }

    /* ══ MODAL ═══════════════════════════════════════ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.5);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: white;
      border-radius: var(--radius-xl);
      padding: 30px;
      width: 90%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-xl);
      border: 1px solid var(--border);
    }
    .modal-lg { max-width: 860px; }
    .modal-sm { max-width: 420px; }
    .modal-title {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 22px;
      color: var(--dark);
      letter-spacing: -.02em;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--border); }

    /* ══ TOAST ═══════════════════════════════════════ */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      padding: 12px 18px;
      border-radius: var(--radius-md);
      font-size: 13.5px;
      font-weight: 600;
      box-shadow: var(--shadow-lg);
      animation: slideIn .2s cubic-bezier(.34,1.56,.64,1);
      min-width: 240px;
      max-width: 360px;
    }
    .toast-success { background: var(--green);  color: white; }
    .toast-error   { background: var(--red);    color: white; }
    .toast-info    { background: var(--brand);  color: white; }

    @keyframes slideIn {
      from { transform: translateX(110%); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    /* ══ LOGIN PAGE ══════════════════════════════════ */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background:
        radial-gradient(circle at 18% 16%, rgba(212,167,44,.18), transparent 16%),
        radial-gradient(circle at 82% 20%, rgba(75,124,255,.22), transparent 18%),
        linear-gradient(160deg, #0f1834 0%, #12234b 48%, #0a1330 100%);
    }

    :root[data-theme="night_study"] .login-wrap {
      background:
        radial-gradient(circle at 18% 16%, rgba(228,184,95,.14), transparent 16%),
        radial-gradient(circle at 82% 20%, rgba(127,168,255,.18), transparent 18%),
        linear-gradient(160deg, #08101f 0%, #101a30 48%, #070d19 100%);
    }

    :root[data-theme="night_study"] .login-showcase {
      color: #edf3ff;
      background:
        radial-gradient(circle at top right, rgba(228,184,95,.12), transparent 24%),
        linear-gradient(180deg, rgba(18,30,52,.84), rgba(20,34,59,.76));
      border-color: rgba(255,255,255,.12);
    }

    :root[data-theme="night_study"] .login-card {
      background: rgba(18,26,44,.95);
      border-color: rgba(36,49,79,.9);
    }
    .login-shell {
      width: min(1080px, 100%);
      display: grid;
      grid-template-columns: minmax(300px, 1.1fr) minmax(340px, 420px);
      gap: 24px;
      align-items: stretch;
    }
    .login-showcase {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      padding: 34px;
      background:
        radial-gradient(circle at top right, rgba(212,167,44,.24), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.05));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow-xl);
      color: white;
    }
    .login-showcase::after {
      content: '';
      position: absolute;
      inset: auto -40px -60px auto;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.12), transparent 68%);
      pointer-events: none;
    }
    .login-showcase-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.12);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #dfe9ff;
    }
    .login-showcase h2 {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: clamp(34px, 4vw, 54px);
      line-height: .98;
      letter-spacing: -.04em;
      margin: 16px 0 12px;
    }
    .login-showcase p {
      max-width: 520px;
      color: rgba(255,255,255,.78);
      font-size: 15px;
    }
    .login-feature-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 26px;
    }
    .login-feature {
      border-radius: 18px;
      padding: 16px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.1);
      backdrop-filter: blur(8px);
    }
    .login-feature strong {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: white;
    }
    .login-feature span {
      font-size: 12px;
      color: rgba(255,255,255,.7);
    }
    .login-footer-note {
      margin-top: 26px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .login-footer-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.78);
      font-size: 12px;
      font-weight: 700;
    }
    .login-card {
      background: rgba(255,255,255,.96);
      border-radius: 28px;
      padding: 44px 40px;
      box-shadow: var(--shadow-xl);
      border: 1px solid rgba(255,255,255,.35);
      backdrop-filter: blur(14px);
      align-self: center;
    }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo .emoji { font-size: 48px; display: block; margin-bottom: 8px; }
    .brand-logo-login {
      width: 84px;
      height: 84px;
      border-radius: 22px;
      margin: 0 auto 12px;
      padding: 8px;
      box-shadow: var(--shadow-md);
      display: block;
    }
    .login-logo h1 {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 31px;
      font-weight: 700;
      color: var(--dark);
      letter-spacing: -.03em;
    }
    .login-logo small { font-size: 12.5px; color: var(--mid); font-weight: 600; }
    .login-form .form-group { margin-bottom: 16px; }
    .login-submit {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 15px;
      border-radius: var(--radius-md);
      font-weight: 700;
    }
    .login-error {
      background: #fff1f2;
      color: var(--red);
      padding: 11px 14px;
      border-radius: var(--radius-md);
      font-size: 13px;
      margin-bottom: 16px;
      border: 1px solid #fecdd3;
      font-weight: 500;
    }

    /* ── Duty items table ──────────────────────────── */
    .items-table input { border: none; border-radius: 0; padding: 6px; background: transparent; }
    .items-table input:focus { background: var(--brand-light); box-shadow: none; border-color: transparent; }
    .items-table td { padding: 4px; }

    /* ── Empty state ───────────────────────────────── */
    .empty { text-align: center; padding: 52px; color: var(--muted); }
    .empty-compact { padding: 20px; }
    .empty .icon { font-size: 42px; margin-bottom: 14px; opacity: .6; }

    /* ══ RESPONSIVE ══════════════════════════════════ */
    @media (max-width: 1100px) {
      :root { --sidebar-w: 210px; }
      .page-content { padding: 18px; }
      .modal { width: 96%; max-width: 640px; padding: 22px; }
      .form-grid { gap: 10px; }
      .content-grid-2 { grid-template-columns: 1fr; }
      .sticky-card { position: static; }
      .topbar { padding: 12px 18px; }
      .topbar-trailing { width: 100%; margin-left: 0; justify-content: flex-start; }
      .topbar-page-select { max-width: 280px; }
      .filters select, .filters input { flex: 1 1 180px; min-width: 160px; }
      .hero-row { align-items: flex-start; }
      .login-shell { grid-template-columns: 1fr; }
      .login-showcase { min-height: auto; }
    }
    @media (max-width: 700px) {
      .sidebar-backdrop.open { display: block; }
      .sidebar {
        display: flex;
        position: fixed;
        inset: 0 auto 0 0;
        width: min(88vw, 320px);
        transform: translateX(-102%);
        box-shadow: 0 20px 60px rgba(0,0,0,.4);
      }
      .sidebar.mobile-open { transform: translateX(0); }
      .menu-toggle { display: inline-flex; }
      .topbar { min-height: var(--header-h); padding: 10px 14px; }
      .topbar-leading, .topbar-trailing { width: 100%; }
      .topbar-leading { align-items: flex-start; }
      .topbar-trailing { gap: 8px; justify-content: stretch; }
      .topbar-page-select { max-width: none; width: 100%; }
      .topbar-date { width: 100%; }
      .page-content { padding: 13px; }
      .form-grid { grid-template-columns: 1fr; }
      .filters-main, .filters-actions { width: 100%; }
      .filters-actions { justify-content: stretch; margin-left: 0; }
      .filters-actions > * { flex: 1 1 auto; }
      .filters select, .filters input, .filters .btn, .filters label { width: 100%; min-width: 0; }
      .filters label { display: block; }
      .notification-panel {
        position: fixed;
        inset: auto 12px 12px 12px;
        width: auto;
        top: auto;
        max-height: 70vh;
      }
      .card { padding: 15px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .card table, .table-card table { min-width: 620px; }
      th, td { padding: 9px 11px; }
      .hero-title { font-size: 24px; }
      .hero-card { padding: 20px 18px; }
      .summary-strip { grid-template-columns: 1fr 1fr; }
      .modal-actions, .form-actions { flex-direction: column; }
      .modal-actions .btn, .form-actions .btn { width: 100%; justify-content: center; }
      .login-wrap { padding: 14px; }
      .login-showcase { padding: 22px 20px; border-radius: 24px; }
      .login-feature-grid { grid-template-columns: 1fr; }
      .login-card { width: 100%; padding: 26px 20px; border-radius: 24px; }
      .page-heading h2 { font-size: 22px; }
      .topbar-meta { width: 100%; }
      .context-chip { flex: 1 1 auto; justify-content: center; }
    }
    @media (max-width: 560px) {
      .summary-strip { grid-template-columns: 1fr; }
      .quick-grid { grid-template-columns: 1fr; }
      .table-card .card-head { padding: 14px 16px; }
      .stat-grid { grid-template-columns: 1fr; }
      .page-heading h2 { font-size: 20px; }
      .page-subtitle { font-size: 11px; }
      .notification-bell { width: 100%; justify-content: center; display: inline-flex; }
      .login-showcase h2 { font-size: 32px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Component files (loaded in order) -->
  <script type="text/babel" src="components/ui.js" data-presets="react"></script>
  <script type="text/babel" src="components/utils.js" data-presets="react"></script>
  <script type="text/babel" src="components/Dashboard.js" data-presets="react"></script>
  <script type="text/babel" src="components/Students.js" data-presets="react"></script>
  <script type="text/babel" src="components/Attendance.js" data-presets="react"></script>
  <script type="text/babel" src="components/StudentMovement.js" data-presets="react"></script>
  <script type="text/babel" src="components/Fees.js" data-presets="react"></script>
  <script type="text/babel" src="components/DutyLog.js" data-presets="react"></script>
  <script type="text/babel" src="components/Expenditures.js" data-presets="react"></script>
  <script type="text/babel" src="components/Inventory.js" data-presets="react"></script>
  <script type="text/babel" src="components/Reports.js" data-presets="react"></script>
  <script type="text/babel" src="components/UserManagement.js" data-presets="react"></script>
  <script type="text/babel" src="components/Settings.js" data-presets="react"></script>
  <script type="text/babel" src="components/ChangePassword.js" data-presets="react"></script>
  <script type="text/babel" src="components/Notifications.js" data-presets="react"></script>
  <script type="text/babel" src="components/Cashbook.js" data-presets="react"></script>
  <script type="text/babel" src="components/Ledger.js" data-presets="react"></script>
  <script type="text/babel" src="app.js" data-presets="react"></script>
</body>
</html>
