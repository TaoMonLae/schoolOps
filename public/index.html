<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MRLC Ledger</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>" />

  <!-- Type system -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <!-- React + ReactDOM CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel for JSX in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ═══════════════════════════════════════════════
       SCHOOLOPS — Education Design System v3
       Palette: Academy Navy · Crest Blue · House Gold
    ════════════════════════════════════════════════ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ── Brand — Binance Yellow (primary CTA, active nav) */
      --brand:        #F0B90B;
      --brand-dark:   #D0980B;
      --brand-light:  #FFFBEB;
      --brand-mid:    #FFD000;
      --brand-soft:   #FFF7DB;
      --accent:       #F0B90B;
      --accent-light: #FFF7DB;

      /* ── Semantic — Green (success / paid / present) */
      --green:        #0ECB81;
      --green-dark:   #0BA86A;
      --green-light:  #E6FFF4;

      /* ── Semantic — Red (danger / overdue) */
      --red:          #F6465D;
      --red-light:    #FFF1F3;

      /* ── Semantic — Amber (warning / attention) */
      --amber:        #D0980B;
      --amber-light:  #FFFBEB;

      /* ── Semantic — Focus Blue (hover / focus states) */
      --blue:         #1EAEDB;
      --blue-light:   #E0F9FF;

      /* ── Neutrals — Ink / Slate scale */
      --dark:         #1E2026;
      --mid:          #32313A;
      --muted:        #848E9C;
      --border:       #E6E8EA;
      --border-focus: #1EAEDB;
      --bg:           #F5F5F5;
      --card:         #FFFFFF;

      /* ── Sidebar */
      --sidebar-bg:   #222126;
      --sidebar-w:    242px;

      /* ── Layout */
      --header-h:     62px;
      --radius-sm:    6px;
      --radius-md:    10px;
      --radius-lg:    12px;
      --radius-xl:    18px;

      /* ── Elevation (DESIGN.md whisper-light shadow system) */
      --shadow-xs:    rgba(32,32,37,.05) 0px 3px 5px 0px;
      --shadow-sm:    rgba(32,32,37,.05) 0px 3px 5px 0px;
      --shadow-md:    rgba(8,8,8,.05) 0px 3px 5px 5px;
      --shadow-lg:    0 24px 56px rgba(17,35,74,.13), 0 10px 18px rgba(17,35,74,.06);
      --shadow-xl:    0 36px 80px rgba(11,22,48,.18), 0 14px 28px rgba(11,22,48,.08);
    }

    :root[data-theme="night_study"] {
      --brand:        #F0B90B;
      --brand-dark:   #D0980B;
      --brand-light:  #28200A;
      --brand-mid:    #FFD000;
      --brand-soft:   #1C1600;
      --accent:       #F0B90B;
      --accent-light: #1C1600;

      --green:        #0ECB81;
      --green-dark:   #0BA86A;
      --green-light:  #0A2018;

      --red:          #F6465D;
      --red-light:    #280D12;

      --amber:        #D0980B;
      --amber-light:  #28200A;

      --blue:         #1EAEDB;
      --blue-light:   #0A1F28;

      --dark:         #edf3ff;
      --mid:          #b3c1da;
      --muted:        #8696b4;
      --border:       #24314f;
      --border-focus: #1EAEDB;
      --bg:           #0c1220;
      --card:         #121a2c;

      --sidebar-bg:   #16120A;

      --shadow-xs:    0 1px 2px rgba(0,0,0,.32);
      --shadow-sm:    rgba(0,0,0,.28) 0px 3px 5px 0px;
      --shadow-md:    rgba(0,0,0,.32) 0px 3px 5px 5px;
      --shadow-lg:    0 24px 56px rgba(0,0,0,.38), 0 10px 18px rgba(0,0,0,.28);
      --shadow-xl:    0 36px 80px rgba(0,0,0,.44), 0 14px 28px rgba(0,0,0,.32);
    }



    :root[data-theme="figma_studio"] {
      --brand:        #000000;
      --brand-dark:   #000000;
      --brand-light:  #F4F4F4;
      --brand-mid:    #111111;
      --brand-soft:   #F8F8F8;
      --accent:       #000000;
      --accent-light: #F4F4F4;

      --green:        #10B981;
      --green-dark:   #059669;
      --green-light:  #ECFDF5;

      --red:          #E11D48;
      --red-light:    #FFF1F2;

      --amber:        #F59E0B;
      --amber-light:  #FFFBEB;

      --blue:         #2563EB;
      --blue-light:   #EFF6FF;

      --dark:         #111111;
      --mid:          #2B2B2B;
      --muted:        #6B7280;
      --border:       #E5E7EB;
      --border-focus: #2563EB;
      --bg:           #FFFFFF;
      --card:         #FFFFFF;

      --sidebar-bg:   #0F0F10;
    }

    :root[data-theme="vercel_clean"] {
      --brand:        #171717;
      --brand-dark:   #000000;
      --brand-light:  #F5F5F5;
      --brand-mid:    #2A2A2A;
      --brand-soft:   #FAFAFA;
      --accent:       #0068D6;
      --accent-light: #EBF5FF;

      --green:        #16A34A;
      --green-dark:   #15803D;
      --green-light:  #F0FDF4;

      --red:          #DC2626;
      --red-light:    #FEF2F2;

      --amber:        #CA8A04;
      --amber-light:  #FEFCE8;

      --blue:         #0068D6;
      --blue-light:   #EBF5FF;

      --dark:         #171717;
      --mid:          #262626;
      --muted:        #737373;
      --border:       #E5E5E5;
      --border-focus: #0068D6;
      --bg:           #FAFAFA;
      --card:         #FFFFFF;

      --sidebar-bg:   #171717;
    }

    :root[data-theme="composio_dark"] {
      --brand:        #00FFFF;
      --brand-dark:   #0089FF;
      --brand-light:  #03242A;
      --brand-mid:    #00B7CC;
      --brand-soft:   #06252A;
      --accent:       #0007CD;
      --accent-light: #04103B;

      --green:        #22C55E;
      --green-dark:   #16A34A;
      --green-light:  #052414;

      --red:          #F43F5E;
      --red-light:    #2A0A13;

      --amber:        #EAB308;
      --amber-light:  #302403;

      --blue:         #00A3FF;
      --blue-light:   #08253A;

      --dark:         #F5F5F5;
      --mid:          #D1D5DB;
      --muted:        #9CA3AF;
      --border:       #2C2C2C;
      --border-focus: #00A3FF;
      --bg:           #0F0F0F;
      --card:         #141414;

      --sidebar-bg:   #000000;

      --shadow-xs:    0 1px 2px rgba(0,0,0,.38);
      --shadow-sm:    0 3px 5px rgba(0,0,0,.34);
      --shadow-md:    0 8px 24px rgba(0,0,0,.42);
      --shadow-lg:    0 24px 56px rgba(0,0,0,.5);
      --shadow-xl:    0 36px 80px rgba(0,0,0,.55);
    }

    :root[data-theme="clay_playful"] {
      --brand:        #fbbd41;
      --brand-dark:   #9d6a09;
      --brand-light:  #fff7db;
      --brand-mid:    #f8cc65;
      --brand-soft:   #faf2dd;
      --accent:       #43089f;
      --accent-light: #efe8ff;

      --green:        #078a52;
      --green-dark:   #02492a;
      --green-light:  #e8fff1;

      --red:          #fc7981;
      --red-light:    #fff2f3;

      --amber:        #d08a11;
      --amber-light:  #fff7db;

      --blue:         #0089ad;
      --blue-light:   #ebf9fd;

      --dark:         #000000;
      --mid:          #55534e;
      --muted:        #9f9b93;
      --border:       #dad4c8;
      --border-focus: #146ef5;
      --bg:           #faf9f7;
      --card:         #ffffff;

      --sidebar-bg:   #02492a;
      --radius-sm:    12px;
      --radius-md:    16px;
      --radius-lg:    24px;
      --radius-xl:    40px;

      --shadow-xs:    rgba(0,0,0,0.1) 0px 1px 1px, rgba(0,0,0,0.04) 0px -1px 1px inset, rgba(0,0,0,0.05) 0px -0.5px 1px;
      --shadow-sm:    rgba(0,0,0,0.1) 0px 1px 1px, rgba(0,0,0,0.04) 0px -1px 1px inset, rgba(0,0,0,0.05) 0px -0.5px 1px;
      --shadow-md:    rgba(0,0,0,0.1) 0px 1px 1px, rgba(0,0,0,0.04) 0px -1px 1px inset, rgba(0,0,0,0.05) 0px -0.5px 1px;
      --shadow-lg:    rgba(0,0,0,.16) 0 12px 28px;
      --shadow-xl:    rgba(0,0,0,.2) 0 20px 44px;
    }
    html, body, #root {
      height: 100%;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Manrope', 'Segoe UI', Arial, system-ui, sans-serif;
      background: var(--bg);
      color: var(--dark);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    :root[data-theme="night_study"] body,
    :root[data-theme="composio_dark"] body {
      background: var(--bg);
    }

    :root[data-theme="clay_playful"] body {
      font-family: 'Roobert', 'Manrope', 'Segoe UI', Arial, system-ui, sans-serif;
      letter-spacing: -.01em;
    }

    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; max-width: 100%; }

    input, select, textarea {
      font-family: inherit;
      font-size: 13.5px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 11px;
      outline: none;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      background: white;
      color: var(--dark);
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="date"],
    input[type="time"],
    input[type="datetime-local"] {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      -webkit-appearance: none;
      appearance: none;
    }
    input[type="date"]::-webkit-date-and-time-value,
    input[type="time"]::-webkit-date-and-time-value,
    input[type="datetime-local"]::-webkit-date-and-time-value {
      text-align: left;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 2px rgba(30,174,219,.1);
    }

    label {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--mid);
      display: block;
      margin-bottom: 5px;
      letter-spacing: .01em;
    }

    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 11px 15px; text-align: left; border-bottom: 1px solid var(--border); }
    th {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    tr:hover td { background: var(--bg); }
    tbody tr:last-child td { border-bottom: none; }

    /* ══ LAYOUT ══════════════════════════════════════ */
    .layout {
      display: flex;
      height: 100%;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      overflow-x: hidden;
    }
    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.5);
      backdrop-filter: blur(2px);
      z-index: 160;
      display: none;
    }

    /* ── Sidebar ───────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      color: white;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
      overflow-x: hidden;
      transition: transform .24s cubic-bezier(.4,0,.2,1), box-shadow .24s ease;
      z-index: 200;
      border-right: 1px solid rgba(255,255,255,.06);
    }

    :root[data-theme="night_study"] .sidebar,
    :root[data-theme="composio_dark"] .sidebar {
      background: var(--sidebar-bg);
    }

    .sidebar-brand {
      padding: 20px 16px 16px;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .sidebar-brand-panel {
      padding: 14px;
      border-radius: 12px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
    }
    .sidebar-brand h1 {
      font-size: 15px;
      font-weight: 700;
      color: white;
      letter-spacing: -.01em;
    }
    .sidebar-brand small { font-size: 11px; color: rgba(255,255,255,.42); }
    .brand-logo { display: block; object-fit: contain; background: white; }
    .brand-logo-sidebar {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      margin-bottom: 11px;
      padding: 6px;
      box-shadow: 0 4px 14px rgba(0,0,0,.3);
    }

    .sidebar-nav { flex: 1; padding: 10px 0 6px; }

    .nav-section {
      padding: 14px 18px 5px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,.28);
    }
    .nav-section:first-child { padding-top: 8px; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px 9px 16px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,.58);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .14s, color .14s, border-color .14s;
      width: 100%;
      text-align: left;
      background: transparent;
      border-top: none;
      border-right: none;
      border-bottom: none;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin: 1px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-item:hover {
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.9);
    }
    .nav-item.active {
      background: var(--brand-light);
      color: var(--brand);
      border-left-color: var(--brand);
      font-weight: 600;
    }
    .nav-item .icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .sidebar-footer {
      padding: 12px 14px 16px;
      border-top: 1px solid rgba(255,255,255,.07);
    }
    .sidebar-footer small { color: rgba(255,255,255,.35); font-size: 11px; }
    .sidebar-footer .logout-btn {
      margin-top: 9px;
      width: 100%;
      padding: 8px 12px;
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.6);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: var(--radius-sm);
      font-size: 12.5px;
      font-weight: 500;
      transition: background .15s, color .15s, border-color .15s;
    }
    .sidebar-footer .logout-btn:hover {
      background: rgba(246,70,93,.2);
      color: #F6465D;
      border-color: rgba(246,70,93,.25);
    }

    /* ── Main shell ────────────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; max-width: 100%; overflow-x: hidden; }

    .topbar {
      min-height: var(--header-h);
      background: white;
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-xs);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
      flex-shrink: 0;
      overflow: visible;
      position: relative;
      z-index: 120;
    }
    .topbar h2 { font-size: 17px; font-weight: 700; flex: 1; letter-spacing: -.01em; }
    .topbar-leading {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1 1 0;
      overflow: hidden;
    }
    .topbar-trailing {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      position: relative;
      overflow: visible;
    }
    .menu-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: white;
      color: var(--mid);
      transition: background .14s, color .14s;
      flex-shrink: 0;
    }
    .menu-toggle:hover { background: var(--bg); color: var(--dark); }

    .page-heading { min-width: 0; overflow: hidden; }
    .page-heading h2 { margin-bottom: 1px; }
    .page-kicker {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--brand-light);
      color: var(--brand-dark);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
    }
    .page-heading h2 {
      font-family: 'Manrope', 'Segoe UI', Arial, system-ui, sans-serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -.02em;
      color: var(--dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .page-subtitle {
      font-size: 12px;
      color: var(--muted);
      max-width: 600px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .topbar-date { font-size: 11.5px; color: var(--muted); white-space: nowrap; font-weight: 500; }
    .topbar-page-select { max-width: 200px; min-width: 120px; }
    .topbar-cta { white-space: nowrap; }
    .topbar-meta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .topbar-identity {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 600;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .context-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 5px 10px;
      background: white;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      box-shadow: var(--shadow-xs);
      white-space: nowrap;
    }
    .context-chip strong {
      color: var(--dark);
      font-weight: 700;
    }
    .context-chip.role {
      background: var(--brand-light);
      border-color: rgba(240,185,11,.3);
      color: var(--brand-dark);
    }

    /* ── Notifications ─────────────────────────────── */
    .notification-wrap { position: relative; overflow: visible; z-index: 130; }
    .notification-bell {
      position: relative;
      border: 1px solid var(--border);
      background: white;
      border-radius: var(--radius-sm);
      padding: 7px 9px;
      line-height: 0;
      color: var(--mid);
      transition: border-color .14s, color .14s, background .14s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .notification-bell:hover {
      border-color: var(--brand);
      color: var(--brand-dark);
      background: var(--brand-light);
    }
    .notification-pill {
      position: absolute;
      top: -6px;
      right: -6px;
      background: var(--red);
      color: white;
      border-radius: 999px;
      min-width: 19px;
      height: 19px;
      font-size: 10px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      border: 2px solid white;
    }
    .notification-panel {
      position: absolute;
      right: 0;
      top: 46px;
      width: min(540px, 92vw);
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xl);
      padding: 14px;
      z-index: 500;
    }
    .notification-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .notification-list { max-height: 420px; overflow-y: auto; display: grid; gap: 8px; }
    .notification-item {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 11px 13px;
      transition: border-color .14s;
    }
    .notification-item:hover { border-color: var(--brand-mid); }
    .notification-item.unread {
      border-left: 4px solid var(--blue);
      background: #f0f9ff;
    }
    .notification-item.read { opacity: .88; }

    /* ── Page content ──────────────────────────────── */
    .page-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 26px;
      min-width: 0;
      max-width: 100%;
      position: relative;
    }
    .page-content::before {
      content: '';
      position: fixed;
      inset: auto 4% 10% auto;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(240,185,11,.04) 0%, transparent 70%);
      pointer-events: none;
      filter: blur(20px);
    }
    .page-content > * { min-width: 0; }

    /* ══ CARDS ══════════════════════════════════════ */
    .card {
      background: white;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 22px;
      min-width: 0;
      max-width: 100%;
      overflow-x: clip;
    }
    .card-title {
      font-size: 14.5px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--dark);
      letter-spacing: -.01em;
    }

    .card-kicker {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--brand-dark);
      margin-bottom: 8px;
    }

    /* Hero card — education banner */
    .hero-card {
      padding: 26px 28px;
      border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      background: white;
      box-shadow: var(--shadow-sm);
      margin-bottom: 20px;
      min-width: 0;
      position: relative;
      overflow: hidden;
    }

    :root[data-theme="night_study"] .hero-card,
    :root[data-theme="composio_dark"] .hero-card {
      border-color: rgba(240,185,11,.12);
      background: rgba(30,25,12,.96);
      box-shadow: var(--shadow-sm);
    }
    .hero-card::before {
      content: '';
      position: absolute;
      top: -34px;
      right: -26px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(240,185,11,.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .hero-main {
      flex: 1 1 460px;
      min-width: 0;
    }
    .hero-eyebrow {
      font-size: 11px;
      font-weight: 700;
      color: var(--brand-dark);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 7px;
    }
    .hero-title {
      font-family: 'Manrope', 'Segoe UI', Arial, system-ui, sans-serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -.02em;
      color: var(--dark);
    }
    .hero-copy { color: var(--mid); max-width: 780px; font-size: 14px; }
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    .hero-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .hero-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(36,87,214,.12);
      color: var(--mid);
      font-size: 12px;
      font-weight: 700;
    }
    .hero-pill strong {
      color: var(--dark);
      font-weight: 800;
    }
    .hero-summary {
      margin-bottom: 0;
      flex: 1 1 320px;
      min-width: min(100%, 340px);
    }

    /* Quick cards */
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .quick-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      background: white;
      box-shadow: var(--shadow-xs);
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-align: left;
      min-height: 122px;
      transition: border-color .18s, box-shadow .18s;
    }
    .quick-card:hover {
      border-color: rgba(240,185,11,.4);
      box-shadow: var(--shadow-md);
    }
    .quick-card-title { font-size: 13.5px; font-weight: 700; letter-spacing: -.01em; }
    .quick-card-copy { font-size: 12.5px; color: var(--mid); }
    .quick-card-meta { font-size: 11px; color: var(--muted); margin-top: auto; font-weight: 500; }

    /* Summary strip */
    .summary-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 13px;
      margin-bottom: 20px;
    }
    .summary-tile {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: white;
      box-shadow: var(--shadow-xs);
      padding: 16px 18px;
    }
    .summary-tile-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--muted);
      font-weight: 700;
    }
    .summary-tile-value { font-size: 22px; font-weight: 800; margin-top: 5px; letter-spacing: -.02em; }
    .summary-tile-copy { font-size: 12px; color: var(--mid); margin-top: 3px; }

    .section-stack { display: grid; gap: 16px; }

    .table-card { padding: 0; overflow: hidden; min-width: 0; box-shadow: var(--shadow-sm); }
    .table-card .card-head {
      padding: 16px 20px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .table-card .card-head .card-title { margin-bottom: 0; }

    /* Info banners */
    .info-banner {
      display: flex;
      align-items: flex-start;
      gap: 13px;
      border-radius: var(--radius-md);
      padding: 14px 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(30,174,219,.2);
      background: var(--blue-light);
    }
    .info-banner.success {
      background: var(--green-light);
      border-color: rgba(14,203,129,.2);
    }
    .info-banner .icon { line-height: 1; flex-shrink: 0; display: flex; align-items: center; }

    .insight-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    .insight-card {
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: white;
      box-shadow: var(--shadow-sm);
      padding: 18px;
      min-width: 0;
    }
    .insight-card h3 {
      font-size: 15px;
      margin-bottom: 6px;
      letter-spacing: -.02em;
    }
    .insight-card p {
      font-size: 12.5px;
      color: var(--mid);
      margin-bottom: 12px;
    }
    .insight-stat {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.03em;
      color: var(--dark);
      margin-bottom: 6px;
    }
    .mini-list {
      display: grid;
      gap: 9px;
    }
    .mini-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      padding-bottom: 9px;
      border-bottom: 1px dashed var(--border);
      font-size: 12.5px;
    }
    .mini-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .mini-row strong {
      color: var(--dark);
    }

    .content-grid-2 {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(300px, 1fr);
      gap: 18px;
      align-items: start;
    }
    .sticky-card { position: sticky; top: 16px; }

    .check-list { display: grid; gap: 10px; }
    .check-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }
    .check-item:last-child { border-bottom: none; padding-bottom: 0; }
    .muted { color: var(--muted); }

    /* ══ STAT CARDS ══════════════════════════════════ */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 18px 20px;
      border-top: 3px solid var(--border);
      transition: box-shadow .18s;
    }
    .stat-card:hover { box-shadow: var(--shadow-md); }

    /* Colored top accent per stat type */
    .stat-card:has(.stat-green)  { border-top-color: var(--green); }
    .stat-card:has(.stat-red)    { border-top-color: var(--red); }
    .stat-card:has(.stat-amber)  { border-top-color: var(--amber); }
    .stat-card:has(.stat-blue)   { border-top-color: var(--blue); }

    .stat-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .stat-value { font-size: 26px; font-weight: 800; letter-spacing: -.03em; }
    .stat-sub   { font-size: 12px; color: var(--muted); margin-top: 3px; font-weight: 500; }
    .stat-green { color: var(--green); }
    .stat-red   { color: var(--red); }
    .stat-amber { color: var(--amber); }
    .stat-blue  { color: var(--blue); }

    /* ══ BUTTONS ══════════════════════════════════════ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 17px;
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      font-weight: 600;
      border: none;
      transition: background .15s, box-shadow .15s, transform .1s;
      letter-spacing: .005em;
    }
    .btn:active { transform: scale(.98); }

    .btn-primary {
      background: var(--brand);
      color: #1E2026;
      box-shadow: rgb(153,153,153) 0px 2px 10px -3px;
    }
    .btn-primary:hover {
      background: var(--blue);
      color: white;
      box-shadow: rgb(153,153,153) 0px 2px 10px -3px;
    }
    .btn-primary:active { background: var(--brand-dark); color: #1E2026; }
    .btn-danger    { background: var(--red); color: white; }
    .btn-danger:hover  { background: #D9304A; }
    .btn-secondary {
      background: white;
      color: var(--mid);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--bg); border-color: #C8CACC; color: var(--dark); }
    .btn-amber     { background: var(--amber); color: white; }
    .btn-amber:hover { background: var(--brand-dark); }
    .btn-sm { padding: 5px 11px; font-size: 12px; }
    .btn-icon { padding: 7px 9px; }

    :root[data-theme="clay_playful"] .btn {
      border-radius: 999px;
      border: 1px solid var(--border);
      transition: transform .2s ease, box-shadow .2s ease, background .2s ease, color .2s ease, border-color .2s ease;
    }
    :root[data-theme="clay_playful"] .btn:hover {
      transform: rotateZ(-4deg) translateY(-2px);
      box-shadow: rgb(0,0,0) -5px 5px;
    }
    :root[data-theme="clay_playful"] .btn-primary {
      color: #000;
      border-color: #d08a11;
    }
    :root[data-theme="clay_playful"] .btn-primary:hover {
      background: #43089f;
      border-color: #43089f;
      color: #fff;
    }
    :root[data-theme="clay_playful"] .btn-secondary {
      background: #fff;
      color: #000;
      border-style: dashed;
    }
    :root[data-theme="clay_playful"] .btn-secondary:hover {
      background: #3bd3fd;
      color: #000;
      border-color: #0089ad;
    }
    :root[data-theme="clay_playful"] .sidebar-brand-panel {
      border-radius: 24px;
      background: rgba(255,255,255,.08);
      border: 1px dashed rgba(255,255,255,.35);
    }
    :root[data-theme="clay_playful"] .card,
    :root[data-theme="clay_playful"] .summary-tile,
    :root[data-theme="clay_playful"] .quick-card,
    :root[data-theme="clay_playful"] .insight-card,
    :root[data-theme="clay_playful"] .notification-panel,
    :root[data-theme="clay_playful"] .notification-item,
    :root[data-theme="clay_playful"] .hero-card,
    :root[data-theme="clay_playful"] .modal,
    :root[data-theme="clay_playful"] .context-chip {
      border-radius: 24px;
    }
    :root[data-theme="clay_playful"] .card,
    :root[data-theme="clay_playful"] .summary-tile,
    :root[data-theme="clay_playful"] .quick-card,
    :root[data-theme="clay_playful"] .insight-card,
    :root[data-theme="clay_playful"] .notification-item,
    :root[data-theme="clay_playful"] .hero-card,
    :root[data-theme="clay_playful"] .modal {
      border-color: #dad4c8;
      box-shadow: var(--shadow-sm);
    }
    :root[data-theme="clay_playful"] .context-chip {
      background: #fff;
      border-style: dashed;
    }
    :root[data-theme="clay_playful"] .page-kicker,
    :root[data-theme="clay_playful"] .hero-eyebrow {
      border-radius: 999px;
      font-size: 10px;
      letter-spacing: .09em;
      text-transform: uppercase;
    }
    :root[data-theme="clay_playful"] .page-heading h2,
    :root[data-theme="clay_playful"] .hero-title {
      font-family: 'Roobert', 'Manrope', 'Segoe UI', Arial, system-ui, sans-serif;
      letter-spacing: -.04em;
      font-weight: 700;
    }
    :root[data-theme="clay_playful"] code,
    :root[data-theme="clay_playful"] .topbar-date,
    :root[data-theme="clay_playful"] .topbar-identity {
      font-family: 'Space Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    :root[data-theme="night_study"] .topbar,
    :root[data-theme="composio_dark"] .topbar {
      background: #1A160A;
      border-bottom-color: rgba(255,255,255,.08);
    }
    :root[data-theme="night_study"] .card,
    :root[data-theme="composio_dark"] .card,
    :root[data-theme="night_study"] .summary-tile,
    :root[data-theme="composio_dark"] .summary-tile,
    :root[data-theme="night_study"] .quick-card,
    :root[data-theme="composio_dark"] .quick-card,
    :root[data-theme="night_study"] .insight-card,
    :root[data-theme="composio_dark"] .insight-card,
    :root[data-theme="night_study"] .notification-panel,
    :root[data-theme="composio_dark"] .notification-panel,
    :root[data-theme="night_study"] .notification-item,
    :root[data-theme="composio_dark"] .notification-item,
    :root[data-theme="night_study"] .modal,
    :root[data-theme="composio_dark"] .modal {
      background: rgba(30,25,12,.96);
      border-color: rgba(240,185,11,.1);
      color: var(--dark);
    }
    :root[data-theme="night_study"] .context-chip,
    :root[data-theme="composio_dark"] .context-chip {
      background: rgba(30,25,12,.96);
      border-color: rgba(240,185,11,.12);
      color: var(--muted);
    }
    :root[data-theme="night_study"] .table-card .card-head,
    :root[data-theme="composio_dark"] .table-card .card-head,
    :root[data-theme="night_study"] .notification-panel-header,
    :root[data-theme="composio_dark"] .notification-panel-header {
      border-bottom-color: rgba(240,185,11,.1);
    }
    :root[data-theme="night_study"] input,
    :root[data-theme="composio_dark"] input,
    :root[data-theme="night_study"] select,
    :root[data-theme="composio_dark"] select,
    :root[data-theme="night_study"] textarea,
    :root[data-theme="composio_dark"] textarea,
    :root[data-theme="night_study"] .topbar-page-select,
    :root[data-theme="composio_dark"] .topbar-page-select {
      background: #16120A;
      color: var(--dark);
      border-color: rgba(240,185,11,.15);
    }
    :root[data-theme="night_study"] .menu-toggle,
    :root[data-theme="composio_dark"] .menu-toggle,
    :root[data-theme="night_study"] .notification-bell,
    :root[data-theme="composio_dark"] .notification-bell {
      background: #16120A;
      color: var(--muted);
      border-color: rgba(240,185,11,.15);
    }
    :root[data-theme="night_study"] .notification-bell:hover,
    :root[data-theme="composio_dark"] .notification-bell:hover {
      background: var(--brand-light);
      color: var(--brand);
      border-color: rgba(240,185,11,.3);
    }
    :root[data-theme="night_study"] th,
    :root[data-theme="composio_dark"] th {
      background: #16120A;
    }
    :root[data-theme="night_study"] tr:hover td,
    :root[data-theme="composio_dark"] tr:hover td {
      background: rgba(240,185,11,.05);
    }
    :root[data-theme="night_study"] .btn-secondary,
    :root[data-theme="composio_dark"] .btn-secondary {
      background: #16120A;
      color: var(--dark);
      border-color: rgba(240,185,11,.15);
    }
    :root[data-theme="night_study"] .btn-secondary:hover,
    :root[data-theme="composio_dark"] .btn-secondary:hover {
      background: rgba(240,185,11,.08);
      color: var(--dark);
    }
    :root[data-theme="night_study"] .badge-gray,
    :root[data-theme="composio_dark"] .badge-gray{ background: #1E1A0E; color: #b3c1da; }
    :root[data-theme="night_study"] .badge-blue,
    :root[data-theme="composio_dark"] .badge-blue{ background: #0A1E28; color: #87d8f5; }
    :root[data-theme="night_study"] .badge-green,
    :root[data-theme="composio_dark"] .badge-green { background: #0A2018; color: #0ECB81; }
    :root[data-theme="night_study"] .badge-amber,
    :root[data-theme="composio_dark"] .badge-amber { background: #28200A; color: #F0B90B; }
    :root[data-theme="night_study"] .badge-red,
    :root[data-theme="composio_dark"] .badge-red { background: #280D12; color: #F6465D; }
    :root[data-theme="night_study"] .login-error,
    :root[data-theme="composio_dark"] .login-error,
    :root[data-theme="night_study"] .page-kicker,
    :root[data-theme="composio_dark"] .page-kicker {
      color: inherit;
    }
    :root[data-theme="night_study"] .login-error,
    :root[data-theme="composio_dark"] .login-error {
      background: #280D12;
      border-color: #4A1520;
      color: #F6465D;
    }

    /* ══ BADGES ══════════════════════════════════════ */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .02em;
    }
    .badge-green { background: #dcfce7; color: #15803d; }
    .badge-red    { background: #ffe4e6; color: #be123c; }
    .badge-amber { background: #fef3c7; color: #b45309; }
    .badge-blue   { background: #e0f2fe; color: #0369a1; }
    .badge-gray   { background: #f1f5f9; color: #64748b; }

    /* ══ FORMS ═══════════════════════════════════════ */
    .form-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 14px; min-width: 0; }
    .form-grid .span2 { grid-column: 1 / -1; }
    .form-group { display: flex; flex-direction: column; min-width: 0; max-width: 100%; }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; flex-wrap: wrap; min-width: 0; }

    /* ── Filters bar ───────────────────────────────── */
    .filters {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      min-width: 0;
    }
    .filters-main { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .filters-actions { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .filters select, .filters input { width: auto; min-width: 120px; }

    /* ── Shared responsive utility classes ────────── */
    .mobile-only { display: none !important; }
    .desktop-only { display: initial !important; }
    .action-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      min-width: 0;
    }
    .action-group > * {
      flex: 0 1 auto;
      min-width: 0;
    }
    .filters-spacer {
      flex: 1 1 auto;
      min-width: 0;
    }
    .filters-total {
      font-size: 14px;
      font-weight: 700;
      color: var(--green);
      white-space: nowrap;
    }
    .inline-stats {
      display: flex;
      align-items: stretch;
      flex-wrap: wrap;
      gap: 10px;
      min-width: 0;
    }
    .inline-stats > * {
      flex: 1 1 150px;
      min-width: 0;
    }
    .table-scroll {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      max-width: 100%;
      min-width: 0;
    }
    .table-scroll > table { width: 100%; min-width: 0; }
    .table-scroll.table-scroll-wide > table { min-width: 620px; }
    .table-scroll.table-scroll-medium > table { min-width: 560px; }
    .table-scroll.table-scroll-compact > table { min-width: 480px; }
    .students-search { width: min(320px, 100%); }
    .students-period-month { width: 130px; }
    .students-period-year { width: 90px; }
    .students-toolbar-actions { justify-content: flex-end; }
    .student-row-actions {
      gap: 6px;
      align-items: center;
    }
    .student-row-actions > * { flex: 0 0 auto; }
    .student-identity {
      display: grid;
      gap: 2px;
      min-width: 160px;
    }
    .student-identity-meta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .student-login-status {
      display: grid;
      gap: 4px;
      min-width: 100px;
    }
    .student-login-status small {
      color: var(--muted);
      font-size: 12px;
      word-break: break-word;
    }
    .row-more-menu {
      position: relative;
    }
    .row-more-menu > summary {
      list-style: none;
      cursor: pointer;
    }
    .row-more-menu > summary::-webkit-details-marker { display: none; }
    .row-more-menu-panel {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      z-index: 10;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);

    @keyframes slideIn {
      from { transform: translateX(110%); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }

    .landing-hero {

      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;

    }
    .landing-hero-copy h1 {

    .landing-hero-copy > p { font-size: 15px; color: var(--mid); max-width: 52ch; line-height: 1.6; margin-bottom: 20px; }

    .landing-hero-signin {

    .hero-signin-logo {

      border-radius: 14px;

      margin: 0 auto 12px;

    }
    .hero-signin-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      margin: 0 auto 12px;
    }
    .hero-signin-header h2 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--dark);
      margin-bottom: 4px;
    }
    .hero-signin-header p {
      font-size: 13px;
      color: var(--muted);

    .demo-credentials {
      margin-top: 18px;

    .landing-section { padding: 28px; }
    .landing-section-head { margin-bottom: 20px; }

    .landing-footer {
      max-width: 1120px;

    /* ── Duty items table ──────────────────────────── */
    .items-table input { border: none; border-radius: 0; padding: 6px; background: transparent; }

    .items-table td { padding: 4px; }

    /* ── Empty state ───────────────────────────────── */

    .empty .icon { margin-bottom: 14px; display: flex; align-items: center; justify-content: center; }

    /* ══ RESPONSIVE ══════════════════════════════════ */
    @media (max-width: 1100px) {
      :root { --sidebar-w: 210px; }
      .page-content { padding: 18px; }
      .modal { width: 96%; max-width: 640px; padding: 22px; }
      .form-grid { gap: 10px; }
      .content-grid-2 { grid-template-columns: 1fr; }
      .sticky-card { position: static; }
      .topbar { padding: 0 18px; }
      /* Hide meta chips and date at tablet — keep topbar single row */
      .topbar-meta { display: none !important; }
      .topbar-date { display: none !important; }
      .topbar-page-select { max-width: 200px; }
      .filters select, .filters input { flex: 1 1 160px; min-width: 140px; }
      .hero-row { align-items: flex-start; }
      .stat-grid { gap: 12px; }
      .insight-grid, .quick-grid, .section-stack { gap: 12px; }
      .landing-feature-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 700px) {
      .mobile-only { display: block !important; }
      .desktop-only { display: none !important; }
      .sidebar-backdrop.open { display: block; }
      .sidebar {
        display: flex;
        position: fixed;
        inset: 0 auto 0 0;
        width: min(88vw, 300px);
        transform: translateX(-102%);
        box-shadow: 0 20px 60px rgba(0,0,0,.5);
        will-change: transform;
      }
      .sidebar.mobile-open { transform: translateX(0); }
      .menu-toggle { display: inline-flex; }
      .topbar { height: var(--header-h); padding: 0 14px; flex-wrap: nowrap; align-items: center; }
      .topbar-leading { flex: 1 1 0; min-width: 0; align-items: center; overflow: hidden; }
      .topbar-trailing { flex-shrink: 0; flex-wrap: nowrap; gap: 6px; }
      .topbar .page-kicker { display: none; }
      .page-content { padding: 13px; }
      .form-grid { grid-template-columns: 1fr; }
      .filters-main, .filters-actions { width: 100%; }
      .filters-actions { justify-content: stretch; margin-left: 0; }
      .filters-actions > * { flex: 1 1 auto; }
      .filters select, .filters input, .filters .btn, .filters label { width: 100%; min-width: 0; }
      .filters label { display: block; }
      .filters-total { width: 100%; text-align: left; }
      .notification-panel {
        position: fixed;
        top: calc(var(--header-h) + 8px);
        left: 12px;
        right: 12px;
        width: auto;
        max-height: calc(100vh - var(--header-h) - 24px);
        overflow-y: auto;
      }
      .action-group > * { flex: 1 1 100%; }
      .inline-stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .card { padding: 15px; overflow-y: visible; overflow-x: clip; }
      .card table, .table-card table { min-width: 0; }
      th, td { padding: 9px 11px; }
      .hero-title { font-size: 22px; line-height: 1.15; }
      .hero-copy { font-size: 13px; }
      .hero-card { padding: 18px 16px; }
      .hero-meta { gap: 7px; margin-top: 10px; }
      .hero-pill { width: 100%; justify-content: space-between; border-radius: 10px; padding: 7px 10px; }
      .hero-pill span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .hero-actions { flex-direction: column; gap: 8px; margin-top: 12px; }
      .hero-actions .btn { width: 100%; justify-content: center; }
      .summary-tile { padding: 13px 14px; }
      .summary-tile-value { font-size: 20px; }
      .quick-card { padding: 14px; min-height: 108px; }
      .insight-card { padding: 14px; }
      .insight-card h3 { font-size: 14px; }
      .insight-card p { margin-bottom: 9px; }
      .mini-row { padding-bottom: 7px; font-size: 12px; }
      .stat-grid { gap: 10px; }
      .stat-card { padding: 14px; }
      .stat-value { font-size: 22px; }
      .content-grid-2 { gap: 12px; }
      .table-card .card-head { padding: 14px 14px 10px; }
      .students-search,
      .students-period-month,
      .students-period-year { width: 100%; }
      .contacts-modal-head { align-items: stretch; }
      .students-inline-stats > * { border-radius: 10px; }
      .student-row-actions { justify-content: flex-start; }
      .row-more-menu-panel { right: auto; left: 0; min-width: 170px; }
      .summary-strip { grid-template-columns: 1fr 1fr; }
      .modal-actions, .form-actions { flex-direction: column; }
      .modal-actions .btn, .form-actions .btn { width: 100%; justify-content: center; }
      .table-row-actions > * { flex: 1 1 100%; }
      .split-grid-2 { grid-template-columns: 1fr; }
      .duty-meta-grid { grid-template-columns: 1fr; }
      .student-dashboard .cards {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 13px;
        background: var(--card);

        display: block;
        font-size: 12px;
        color: var(--muted);

      .student-dashboard .metric h3 {
        font-size: 19px;
        line-height: 1.25;
      }
      .student-dashboard .card {
        border-radius: 12px;
        padding: 14px;
      }
      .student-dashboard .card-head h3 {
        font-size: 16px;
      }
      .mobile-stack-table {
        border-collapse: separate;
        border-spacing: 0;
      }
      .mobile-stack-table thead { display: none; }
      .mobile-stack-table tbody tr {
        display: block;
        margin-bottom: 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--card);
        box-shadow: var(--shadow-xs);
      }
      .mobile-stack-table tbody td {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;

        width: 100%;

      .duty-actions-row {

      .duty-actions-row .btn {

      .landing-wrap { padding: 12px 10px 24px; }
      .landing-nav { margin-bottom: 12px; }

      .landing-hero { grid-template-columns: 1fr; }
      .landing-hero-copy { padding: 24px 20px; }
      .landing-hero-signin { padding: 24px 20px; }
      .landing-section { padding: 20px; }
      .landing-feature-grid { grid-template-columns: 1fr; }

      .topbar .page-subtitle { display: none; }

      .card { overflow-x: visible; }
      .toast-container { left: 12px; right: 12px; bottom: 16px; }
      .toast { max-width: none; min-width: 0; }
    }
    @media (max-width: 560px) {
      .inline-stats { grid-template-columns: 1fr; }
      .summary-strip { grid-template-columns: 1fr; }
      .quick-grid { grid-template-columns: 1fr; }
      .table-card .card-head { padding: 14px 16px; }
      .stat-grid { grid-template-columns: 1fr; }
      .hero-meta { margin-top: 8px; }
      .hero-summary { min-width: 100%; }
      .hero-title { font-size: 20px; }
      .page-heading h2 { font-size: 17px; }
      .page-subtitle,
      .topbar .page-kicker { display: none; }
      .topbar-page-select { display: none; }
    }
  </style>
